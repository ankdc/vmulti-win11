name: Build VMulti Windows 11 Driver (x64)

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Visual Studio environment
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17'
      
      - name: Install Windows Driver Kit (WDK)
        shell: powershell
        run: |
          Write-Host "Installing Windows Driver Kit..."
          
          # Download WDK installer
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2243390"
          $wdkInstaller = "$env:TEMP\wdk.exe"
          
          Write-Host "Downloading WDK..."
          try {
            Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller -TimeoutSec 600 -UseBasicParsing
            Write-Host "Download completed"
          } catch {
            Write-Host "Download failed: $_"
            exit 1
          }
          
          Write-Host "Installing WDK (this may take several minutes)..."
          & $wdkInstaller /quiet /norestart /features OptionId.WindowsDriverKit
          
          # Wait for installation to complete
          $timeout = 0
          while ((Get-Process wdk -ErrorAction SilentlyContinue) -and $timeout -lt 300) {
            Start-Sleep -Seconds 5
            $timeout += 5
          }
          
          Start-Sleep -Seconds 30
          Write-Host "WDK installation completed"
      
      - name: Build using build.bat
        shell: cmd
        run: |
          echo Building VMulti driver...
          call build.bat
          if errorlevel 1 (
            echo Build failed
            exit /b 1
          )
          echo Build completed successfully
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vmulti-driver-x64-build
          path: driver_dist/
          retention-days: 30
          if-no-files-found: warn
      
      - name: List output files
        shell: powershell
        run: |
          Write-Host "Build output files:"
          if (Test-Path "driver_dist") {
            Get-ChildItem -Path "driver_dist" -Recurse -ErrorAction SilentlyContinue | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
              Write-Host "  - $($_.FullName -replace [regex]::Escape((Get-Location).Path + '\'), '')"
            }
          }
      
      - name: Build Success Summary
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "========================================================"
          Write-Host "BUILD COMPLETED SUCCESSFULLY"
          Write-Host "========================================================"
          Write-Host ""
          Write-Host "Project: VMulti Windows 11 HID Driver"
          Write-Host "Architecture: x64 (x86_64)"
          Write-Host "Configuration: Release"
          Write-Host ""
          Write-Host "Output Location: driver_dist/"
          Write-Host ""
          Write-Host "Installation Instructions:"
          Write-Host "1. Enable Test Mode:"
          Write-Host "   bcdedit /set testsigning on"
          Write-Host ""
          Write-Host "2. Install Certificate:"
          Write-Host "   Right-click: driver_dist\cert\WDKTestCert.cer"
          Write-Host "   Install Certificate > Local Machine > Trusted Root CA"
          Write-Host ""
          Write-Host "3. Install Driver:"
          Write-Host "   Device Manager > Add legacy hardware"
          Write-Host "   Have Disk > driver_dist\x64\vmulti.inf"
          Write-Host ""
          Write-Host "========================================================"
