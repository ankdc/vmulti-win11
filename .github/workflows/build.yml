name: Build VMulti Windows 11 Driver

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Visual Studio environment
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: 'latest'
      
      - name: Setup Windows Driver Kit (WDK)
        run: |
          # Download and install WDK for Windows 11
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2243390"
          $wdkInstaller = "$env:TEMP\wdk.exe"
          Write-Host "Downloading WDK..."
          Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller
          Write-Host "Installing WDK..."
          & $wdkInstaller /S /D="C:\Program Files (x86)\Windows Kits\11"
          Start-Sleep -Seconds 30
          Write-Host "WDK installation complete"
        shell: powershell
      
      - name: Clean previous build artifacts
        run: |
          if (Test-Path "driver_dist") { Remove-Item -Recurse -Force "driver_dist" }
          if (Test-Path "driver\kmdf\x64\Release") { Remove-Item -Recurse -Force "driver\kmdf\x64\Release" }
          if (Test-Path "driver\kmdf\ARM64\Release") { Remove-Item -Recurse -Force "driver\kmdf\ARM64\Release" }
          if (Test-Path "client\x64\Release") { Remove-Item -Recurse -Force "client\x64\Release" }
          if (Test-Path "client\ARM64\Release") { Remove-Item -Recurse -Force "client\ARM64\Release" }
          if (Test-Path "test\x64\Release") { Remove-Item -Recurse -Force "test\x64\Release" }
          if (Test-Path "test\ARM64\Release") { Remove-Item -Recurse -Force "test\ARM64\Release" }
          Write-Host "Cleaned previous build artifacts"
        shell: powershell
      
      - name: Create distribution directory
        run: |
          New-Item -ItemType Directory -Force -Path "driver_dist\x64"
          New-Item -ItemType Directory -Force -Path "driver_dist\ARM64"
          New-Item -ItemType Directory -Force -Path "driver_dist\inc"
          New-Item -ItemType Directory -Force -Path "driver_dist\cert"
        shell: powershell
      
      - name: Build vmulticlient library - x64
        run: |
          msbuild client\vmulticlient.vcxproj /p:Configuration=Release /p:Platform=x64 /m
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: powershell
      
      - name: Build vmulticlient library - ARM64
        run: |
          msbuild client\vmulticlient.vcxproj /p:Configuration=Release /p:Platform=ARM64 /m
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: powershell
      
      - name: Build driver - x64
        run: |
          msbuild driver\kmdf\vmulti.vcxproj /p:Configuration=Release /p:Platform=x64 /p:TestSign=false /m
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: powershell
      
      - name: Build driver - ARM64
        run: |
          msbuild driver\kmdf\vmulti.vcxproj /p:Configuration=Release /p:Platform=ARM64 /p:TestSign=false /m
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: powershell
      
      - name: Build test application - x64
        run: |
          msbuild test\testvmulti.vcxproj /p:Configuration=Release /p:Platform=x64 /m
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: powershell
      
      - name: Build test application - ARM64
        run: |
          msbuild test\testvmulti.vcxproj /p:Configuration=Release /p:Platform=ARM64 /m
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: powershell
      
      - name: Copy x64 files to distribution
        run: |
          Copy-Item -Path "driver\kmdf\x64\Release\vmulti\*" -Destination "driver_dist\x64\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "driver\kmdf\x64\Release\vmulti.sys" -Destination "driver_dist\x64\vmulti_raw.sys" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "client\x64\Release\vmulticlient.lib" -Destination "driver_dist\x64\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "test\x64\Release\testvmulti.exe" -Destination "driver_dist\x64\" -Force -ErrorAction SilentlyContinue
        shell: powershell
      
      - name: Copy ARM64 files to distribution
        run: |
          Copy-Item -Path "driver\kmdf\ARM64\Release\vmulti\*" -Destination "driver_dist\ARM64\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "driver\kmdf\ARM64\Release\vmulti.sys" -Destination "driver_dist\ARM64\vmulti_raw.sys" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "client\ARM64\Release\vmulticlient.lib" -Destination "driver_dist\ARM64\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "test\ARM64\Release\testvmulti.exe" -Destination "driver_dist\ARM64\" -Force -ErrorAction SilentlyContinue
        shell: powershell
      
      - name: Copy header and documentation files
        run: |
          Copy-Item -Path "inc\vmulticlient.h" -Destination "driver_dist\inc\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "inc\vmulticommon.h" -Destination "driver_dist\inc\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "README.md" -Destination "driver_dist\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "status.md" -Destination "driver_dist\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "driver\kmdf\x64\Release\vmulti.cer" -Destination "driver_dist\cert\WDKTestCert.cer" -Force -ErrorAction SilentlyContinue
        shell: powershell
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vmulti-driver-build
          path: driver_dist/
          retention-days: 30
