name: Build VMulti Windows 11 Driver

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Cho phép kích hoạt build thủ công từ giao diện GitHub
  workflow_dispatch:

jobs:
  build:
    name: Build x64 and ARM64 Drivers
    # Sử dụng Windows Server 2022 (đã cài sẵn Visual Studio 2022 và Windows SDK)
    runs-on: windows-2022 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x64

    # Mặc định GitHub Runner có Windows SDK nhưng KHÔNG có WDK.
    # Bước này tải và cài đặt WDK (Windows Driver Kit) âm thầm.
    - name: Install Windows Driver Kit (WDK)
      shell: powershell
      run: |
        echo "Downloading Windows Driver Kit (WDK)..."
        # Link tải WDK tĩnh từ Microsoft (hỗ trợ Windows 11)
        Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2271891" -OutFile wdksetup.exe
        
        echo "Installing WDK (this may take a few minutes)..."
        $Process = Start-Process -FilePath ".\wdksetup.exe" -ArgumentList "/q" -Wait -PassThru -NoNewWindow
        
        if ($Process.ExitCode -ne 0) {
          Write-Error "WDK Installation failed with exit code $($Process.ExitCode)"
          exit 1
        }
        echo "WDK Installation completed successfully."

    # Chạy file build.bat của bạn. Dùng shell cmd để tương thích tốt nhất.
    - name: Run Build Script (build.bat)
      shell: cmd
      run: |
        build.bat

    # Upload thư mục driver_dist (chứa sys, inf, cer, exe, lib...) lên GitHub Artifacts
    # Để bạn có thể tải về sau khi build xong.
    - name: Upload Driver Distribution Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vmulti-driver-dist
        path: driver_dist/
        retention-days: 14 # Giữ file trên GitHub trong 14 ngày
